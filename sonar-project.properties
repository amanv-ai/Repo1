# Your specific SonarCloud project details
sonar.projectKey=amanv-ai_Repo1
sonar.organization=amanv-ai

# This tells SonarCloud it is cloud-based
sonar.host.url=[https://sonarcloud.io](https://sonarcloud.io)

# Point Sonar to your source code and notebooks
sonar.sources=src,notebooks

# Point Sonar to your tests
sonar.tests=tests

# Ingest the Pytest coverage report generated by GitHub Actions
sonar.python.coverage.reportPaths=coverage.xml
