name: Databricks Code Quality & SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_test_analyze:
    name: Build, Lint, and SonarCloud Scan
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code from GitHub (fetch-depth: 0 is REQUIRED for SonarCloud)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      # Step 2: Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install all required linting libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      # Step 4: Run Linters (Non-blocking)
      # continue-on-error allows the pipeline to proceed even if code formatting issues are found
      - name: Lint with Ruff and Black
        continue-on-error: true
        run: |
          black ./notebooks || true
          ruff check ./notebooks --exit-zero

      # Step 5: Upload code analysis to SonarCloud 
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Provided automatically by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # The secret you just added in Step 2!
