name: Databricks Code Quality & SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_test_analyze:
    name: Build, Test, and SonarCloud Scan
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code from GitHub (fetch-depth: 0 is REQUIRED for SonarCloud)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      # Step 2: Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install all required testing libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-cov pyspark

      # Step 4: Run Linters to check code quality (Optional but recommended)
      - name: Lint with Ruff and Black
        run: |
          black --check ./src ./notebooks
          ruff check ./src ./notebooks

      # Step 5: Run Unit Tests and generate coverage report (coverage.xml)
      - name: Run Pytest and Coverage
        run: |
          pytest ./tests --junitxml=junit/test-results.xml --cov=src --cov=notebooks --cov-report=xml:coverage.xml

      # Step 6: Upload code and test coverage to SonarCloud (Using the action version you were provided)
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Provided automatically by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # The secret you just added in Step 2!
